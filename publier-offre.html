<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publier une offre - CareerPropulse</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
        }

        header {
            background: white;
            padding: 20px 0;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
        }

        .logo-bleu {
            color: #0a2540;
        }

        .logo-vert {
            color: #00b4a5;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .form-card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .form-card h1 {
            color: #0a2540;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #0a2540;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .btn-submit {
            background: #00b4a5;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        .btn-submit:hover {
            background: #009485;
        }

        .message {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
        }

        .message.error {
            background: #fee;
            color: #c33;
        }

        .message.success {
            background: #efe;
            color: #3c3;
        }
    </style>
</head>

<body>
    <header class="header">
        <nav class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-bleu">Career</span><span class="logo-vert">Propulse</span>
            </a>
            <div>
                <a href="offres.html" style="margin-right: 15px;">Offres</a>
                <a href="connexion.html">Déconnexion</a>
            </div>
        </nav>
    </header>

    <div class="container">
        <div class="form-card">
            <h1>Publier une offre d'emploi</h1>
            <form id="offerForm">
                <div class="form-group">
                    <label for="title">Titre du poste *</label>
                    <input type="text" id="title" required placeholder="ex: Développeur Python">
                </div>

                <div class="form-group">
                    <label for="location">Localisation *</label>
                    <input type="text" id="location" required placeholder="ex: Alger, Télétravail">
                </div>

                <div class="form-group">
                    <label for="description">Description du poste *</label>
                    <textarea id="description" required
                        placeholder="Décrivez le poste, les compétences requises, etc."></textarea>
                </div>

                <button type="submit" class="btn-submit">Publier l'offre</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('offerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const title = document.getElementById('title').value;
            const location = document.getElementById('location').value;
            const description = document.getElementById('description').value;

            try {
                const response = await fetch('api.php?action=add_offer', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, location, description })
                });
                const data = await response.json();

                if (data.success) {
                    alert('Offre publiée avec succès!');
                    window.location.href = 'offres.html';
                } else {
                    alert(data.message || 'Erreur lors de la publication');
                }
            } catch (error) {
                alert('Erreur: ' + error.message);
            }
        });
    </script>
</body>

</html>
