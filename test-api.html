<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test API</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        .box { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
        pre { background: #f5f5f5; padding: 10px; overflow: auto; }
    </style>
</head>
<body>
    <h1>🔧 Test API CareerPropulse</h1>
    
    <div class="box">
        <h2>1. Test API GET (Lister offres)</h2>
        <button onclick="testApiOffers()">Tester /api.php?action=get_offers</button>
        <div id="offersResult"></div>
    </div>
    
    <div class="box">
        <h2>2. Test API POST (Inscription test)</h2>
        <button onclick="testApiRegister()">Tester Inscription</button>
        <div id="registerResult"></div>
    </div>
    
    <div class="box">
        <h2>3. Test accès direct api.php</h2>
        <button onclick="testDirectApi()">Test direct</button>
        <div id="directResult"></div>
    </div>

    <div class="box">
        <h2>4. Test API LOGIN (Connexion)</h2>
        <button onclick="testApiLogin()">Tester Connexion Employeur</button>
        <div id="loginResult"></div>
    </div>

    <script>
        async function testApiOffers() {
            const div = document.getElementById('offersResult');
            try {
                console.log('Fetching: api.php?action=get_offers');
                const response = await fetch('api.php?action=get_offers');
                console.log('Status:', response.status);
                
                const text = await response.text();
                console.log('Response text:', text);
                
                const data = JSON.parse(text);
                div.innerHTML = `<div class="success"><strong>✓ API répond!</strong><pre>${JSON.stringify(data, null, 2)}</pre></div>`;
            } catch (error) {
                div.innerHTML = `<div class="error"><strong>✗ Erreur:</strong><pre>${error.message}\n\n${error.stack}</pre></div>`;
                console.error('Error:', error);
            }
        }
        
        async function testApiRegister() {
            const div = document.getElementById('registerResult');
            try {
                const response = await fetch('api.php?action=register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        email: 'test@test.com',
                        password: '123456',
                        role: 'employeur',
                        name: 'Test',
                        company: 'Test Company'
                    })
                });
                
                const text = await response.text();
                const data = JSON.parse(text);
                
                if (data.success) {
                    div.innerHTML = `<div class="success"><strong>✓ Inscription OK!</strong><pre>${JSON.stringify(data, null, 2)}</pre></div>`;
                } else {
                    div.innerHTML = `<div class="error"><strong>✗ Erreur API:</strong><pre>${JSON.stringify(data, null, 2)}</pre></div>`;
                }
            } catch (error) {
                div.innerHTML = `<div class="error"><strong>✗ Erreur:</strong><pre>${error.message}</pre></div>`;
            }
        }
        
        async function testDirectApi() {
            const div = document.getElementById('directResult');
            try {
                const response = await fetch('api.php');
                const text = await response.text();
                div.innerHTML = `<div class="box"><strong>Réponse directe api.php:</strong><pre>${text.substring(0, 500)}</pre></div>`;
            } catch (error) {
                div.innerHTML = `<div class="error"><strong>✗ Erreur:</strong><pre>${error.message}</pre></div>`;
            }
        }
        
        async function testApiLogin() {
            const div = document.getElementById('loginResult');
            try {
                const response = await fetch('api.php?action=login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        email: 'jean@entreprise.com',
                        password: '123456',
                        role: 'employeur'
                    })
                });
                
                const text = await response.text();
                console.log('Response text:', text);
                
                const data = JSON.parse(text);
                
                if (data.success) {
                    div.innerHTML = `<div class="success"><strong>✓ Connexion OK!</strong><pre>${JSON.stringify(data, null, 2)}</pre></div>`;
                } else {
                    div.innerHTML = `<div class="error"><strong>✗ Erreur connexion:</strong><pre>${JSON.stringify(data, null, 2)}</pre></div>`;
                }
            } catch (error) {
                div.innerHTML = `<div class="error"><strong>✗ Erreur:</strong><pre>${error.message}</pre></div>`;
            }
        }
        
        // Auto test
        window.addEventListener('load', () => {
            testApiOffers();
            testDirectApi();
        });
    </script>
</body>
</html>
