<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration - CareerPropulse</title>
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <nav class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-bleu">Career</span><span class="logo-vert">Propulse</span>
            </a>
            <div class="nav-buttons">
                <span class="user-info" id="userInfo"></span>
                <button id="logoutBtn" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
            </div>
        </nav>
    </header>

    <div class="dashboard-container">
        <h1><i class="fas fa-shield-alt"></i> Panneau d'administration</h1>
        <div id="messageArea" class="message-area"></div>

        <!-- Onglets -->
        <div class="admin-tabs">
            <button class="tab-btn active" data-tab="employees"><i class="fas fa-users"></i> Employés</button>
            <button class="tab-btn" data-tab="employers"><i class="fas fa-building"></i> Employeurs</button>
            <button class="tab-btn" data-tab="offers"><i class="fas fa-briefcase"></i> Offres</button>
            <button class="tab-btn" data-tab="applications"><i class="fas fa-file-alt"></i> Candidatures</button>
        </div>

        <!-- Onglet Employés -->
        <div id="employeesTab" class="tab-content active">
            <div class="table-container">
                <table class="admin-table">
                    <thead>
                        <tr><th>ID</th><th>Email</th><th>Nom complet</th><th>Téléphone</th><th>Titre</th><th>Inscrit le</th><th>Action</th></tr>
                    </thead>
                    <tbody id="employeesTableBody">
                        <tr><td colspan="7" class="loading-cell"><i class="fas fa-spinner fa-pulse"></i> Chargement...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Onglet Employeurs -->
        <div id="employersTab" class="tab-content">
            <div class="table-container">
                <table class="admin-table">
                    <thead>
                        <tr><th>ID</th><th>Email</th><th>Entreprise</th><th>Représentant</th><th>Poste</th><th>Secteur</th><th>Localisation</th><th>Action</th></tr>
                    </thead>
                    <tbody id="employersTableBody">
                        <tr><td colspan="8" class="loading-cell"><i class="fas fa-spinner fa-pulse"></i> Chargement...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Onglet Offres -->
        <div id="offersTab" class="tab-content">
            <div class="table-container">
                <table class="admin-table">
                    <thead>
                        <tr><th>ID</th><th>Titre</th><th>Entreprise</th><th>Localisation</th><th>Publiée le</th></tr>
                    </thead>
                    <tbody id="offersTableBody">
                        <tr><td colspan="5" class="loading-cell"><i class="fas fa-spinner fa-pulse"></i> Chargement...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Onglet Candidatures -->
        <div id="applicationsTab" class="tab-content">
            <div class="table-container">
                <table class="admin-table">
                    <thead>
                        <tr><th>ID</th><th>Offre</th><th>Entreprise</th><th>Candidat</th><th>Email candidat</th><th>Date</th><th>Statut</th></tr>
                    </thead>
                    <tbody id="applicationsTableBody">
                        <tr><td colspan="7" class="loading-cell"><i class="fas fa-spinner fa-pulse"></i> Chargement...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
