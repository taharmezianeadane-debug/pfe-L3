<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offres d'emploi - CareerPropulse</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
        }

        header {
            background: white;
            padding: 20px 0;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
        }

        .logo-bleu {
            color: #0a2540;
        }

        .logo-vert {
            color: #00b4a5;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .offers-grid {
            display: grid;
            gap: 20px;
        }

        .offer-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
        }

        .offer-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
        }

        .offer-title {
            font-size: 20px;
            font-weight: bold;
            color: #0a2540;
            margin-bottom: 10px;
        }

        .offer-company {
            color: #00b4a5;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .offer-location {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .offer-description {
            color: #555;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .offer-date {
            font-size: 12px;
            color: #999;
        }

        .btn-apply {
            background: #00b4a5;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn-apply:hover {
            background: #009485;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .empty {
            text-align: center;
            padding: 60px;
            color: #666;
        }
    </style>
</head>

<body>
    <header class="header">
        <nav class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-bleu">Career</span><span class="logo-vert">Propulse</span>
            </a>
            <div>
                <a href="connexion.html" style="margin-right: 15px;">Connexion</a>
                <a href="publier-offre.html" class="btn-apply">Publier une offre</a>
            </div>
        </nav>
    </header>

    <div class="container">
        <h1>Offres d'emploi disponibles</h1>
        <div id="offersContainer" class="offers-grid">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i> Chargement...</div>
        </div>
    </div>

    <script>
        async function loadOffers() {
            try {
                const response = await fetch('api.php?action=get_offers');
                const data = await response.json();
                const container = document.getElementById('offersContainer');

                if (data.offers && data.offers.length > 0) {
                    container.innerHTML = data.offers.map(offer => `
                        <div class="offer-card">
                            <div class="offer-title">${offer.title}</div>
                            <div class="offer-company">🏢 ${offer.company_name}</div>
                            <div class="offer-location">📍 ${offer.location || 'Non spécifiée'}</div>
                            <div class="offer-description">${offer.description || 'Pas de description'}</div>
                            <div class="offer-date">Publié le ${new Date(offer.created_at).toLocaleDateString('fr-FR')}</div>
                            <button class="btn-apply" style="margin-top: 15px;">Postuler</button>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<div class="empty">Aucune offre disponible pour le moment.</div>';
                }
            } catch (error) {
                document.getElementById('offersContainer').innerHTML = '<div class="empty">Erreur: ' + error.message + '</div>';
            }
        }

        loadOffers();
    </script>
</body>

</html>
