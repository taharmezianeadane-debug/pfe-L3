<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerPropulse - Connexion</title>
    <link rel="stylesheet" href="connexion.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <header class="header">
        <nav class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-bleu">Career</span><span class="logo-vert">Propulse</span>
            </a>

            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Accueil</a></li>
                 
            </ul>

            <div class="nav-buttons">
                <a href="connexion.html" class="btn-connexion active">Connexion</a>
            </div>
        </nav>
    </header>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>Bienvenue !</h1>
                <p>Connectez-vous a votre espace</p>
            </div>

            <div class="role-selector">
                <button type="button" class="role-btn active" id="roleEmploye">
                    <i class="fas fa-user-tie"></i>
                    <span>Employe</span>
                </button>
                <button type="button" class="role-btn" id="roleEmployeur">
                    <i class="fas fa-building"></i>
                    <span>Employeur</span>
                </button>
            </div>

            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i>
                        Adresse email
                    </label>
                    <input type="email" class="form-control" id="email" placeholder="exemple@email.com">
                </div>

                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i>
                        Mot de passe
                    </label>
                    <div class="password-input">
                        <input type="password" class="form-control" id="password" placeholder="........">
                        <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                    </div>
                </div>

                <div class="form-options">
                    <div class="remember-me">
                        <input type="checkbox" id="remember" checked>
                        <label for="remember">Se souvenir de moi</label>
                    </div>
                    <span class="forgot-password">Mot de passe oublie ?</span>
                </div>

                <button type="submit" class="btn-login" id="btnLogin">
                    <span>Se connecter</span>
                    <i class="fas fa-arrow-right"></i>
                </button>

                <div class="register-link">
                    <p>Pas encore de compte ?
                        <a href="#" id="registerLink">S'inscrire</a>
                    </p>
                </div>
            </form>
        </div>
    </div>

    <div class="welcome-message" id="welcomeMessage">
        <div class="message-content">
            <i class="fas fa-check-circle"></i>
            <h3>Connexion reussie !</h3>
            <p>Redirection vers votre espace...</p>
        </div>
    </div>

    <script src="connexion.js"></script>
</body>

</html>
