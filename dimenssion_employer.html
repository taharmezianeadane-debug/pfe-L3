<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Employé - CareerPropulse</title>
    <link rel="stylesheet" href="dimenssion_employer.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <nav class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-bleu">Career</span><span class="logo-vert">Propulse</span>
            </a>
            <div class="nav-buttons">
                   <button id="logoutBtn" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
         
                <button  href="profil_employer.html"    class="btn-logout"><i class="fas fa-sign-out-alt"></i> Profil</button>
            </div>
        </nav>
    </header>

    <!-- Contenu principal -->
    <main class="dashboard-container">
        <div class="dashboard-header">
            <h1><i class="fas fa-briefcase"></i> Offres d'emploi</h1>
            <p>Postulez aux offres qui correspondent à votre profil</p>
        </div>

        <!-- Zone de message -->
        <div id="messageArea" class="message-area"></div>

        <!-- Liste des offres -->
        <div id="offersContainer" class="offers-grid">
            <div class="loading-spinner"><i class="fas fa-spinner fa-pulse"></i> Chargement des offres...</div>
        </div>
    </main>

    <script src="dimenssion_employer.js"></script>
</body>
</html>
