<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Employeur - Candidatures | CareerPropulse</title>
    <link rel="stylesheet" href="dimenssion_employeur.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
   <header class="header">
        <nav class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-bleu">Career</span><span class="logo-vert">Propulse</span>
            </a>
            <div class="nav-buttons">
                <button id="addOfferBtn" class="btn-add-offer"><i class="fas fa-plus-circle"></i> Ajouter une offre</button>
                 <button id="addOfferBtn" class="btn-add-offer"><i class="fas fa-plus-circle"></i> Acceille</button>
               
                <span class="user-info" id="userInfo"></span>
                <button id="logoutBtn" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
            </div>
        </nav>
    </header>

    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1><i class="fas fa-users"></i> Candidatures reçues</h1>
            <p>Consultez et gérez les candidatures pour vos offres d'emploi</p>
        </div>

        <div id="messageArea" class="message-area"></div>

        <div id="applicationsContainer" class="applications-container">
            <div class="loading-spinner"><i class="fas fa-spinner fa-pulse"></i> Chargement...</div>
        </div>
    </div>

    <!-- Modal CV -->
    <div id="cvModal" class="modal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <div id="cvModalBody"></div>
        </div>
    </div>

    <script src="dimenssion_employeur.js"></script>
</body>
</html>
