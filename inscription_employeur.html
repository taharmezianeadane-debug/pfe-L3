<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="">
    <title>CareerPropulse - Inscription Employeur</title>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="inscription_employeur.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <header class="header">
        <nav class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-bleu">Career</span><span class="logo-vert">Propulse</span>
            </a>

            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Accueil</a></li>
                 <li><a href="index.html" class="nav-link">Caracteristique </a></li>
                   <li><a href="index.html" class="nav-link">Feedback</a></li>
                </ul>

            <div class="nav-buttons">
                <a href="connexion.html" class="btn-connexion">Connexion</a>
            </div>
        </nav>
    </header>
    <div class="progress-bar">
        <div class="progress-fill progress-empty"></div>
    </div>

    <div class="split-container">
        <div class="visual-side">
            <div class="visual-content">
                <h1 class="visual-title">Creez votre espace recruteur</h1>
                <p class="visual-subtitle">Rejoignez plus de 5000 entreprises qui recrutent chaque jour</p>

                <div class="simple-illustration">
                    <i class="fas fa-building fa-4x visual-icon"></i>
                    <i class="fas fa-users fa-4x visual-icon"></i>
                    <i class="fas fa-chart-line fa-4x visual-icon"></i>
                </div>
            </div>
        </div>

        <div class="form-side">
            <div class="form-container">
                <div class="form-header">
                    <h2>Inscription employeur</h2>
                    <p>Commencez a recruter gratuitement</p>
                </div>

                <form class="employeur-form" id="employeurForm">
                    <div class="form-section">
                        <h3><i class="fas fa-user-tie"></i> Vos informations</h3>

                        <div class="form-group">
                            <label>Nom complet *</label>
                            <input type="text" class="form-control" id="nomComplet" placeholder="Votre nom et prenom">
                        </div>

                        <div class="form-group">
                            <label>Poste occupe *</label>
                            <input type="text" class="form-control" id="poste" placeholder="ex: DRH, CEO, Manager">
                        </div>

                        <div class="form-group">
                            <label>E-mail professionnel *</label>
                            <input type="email" class="form-control" id="email" placeholder="vous@entreprise.com">
                        </div>
                    </div>

                    <div class="form-section">
                        <h3><i class="fas fa-building"></i> Votre entreprise</h3>

                        <div class="form-group">
                            <label>Nom de l'entreprise *</label>
                            <input type="text" class="form-control" id="nomEntreprise" placeholder="Nom de votre societe">
                        </div>

                        <div class="form-row">
                            <div class="form-group half">
                                <label>Secteur *</label>
                                <select class="form-control" id="secteur">
                                    <option value="">Selectionnez</option>
                                    <option value="it">Technologies / IT</option>
                                    <option value="finance">Finance / Banque</option>
                                    <option value="sante">Sante / Pharmacie</option>
                                    <option value="industrie">Industrie</option>
                                    <option value="commerce">Commerce</option>
                                    <option value="service">Services</option>
                                    <option value="autre">Autre</option>
                                </select>
                            </div>

                            <div class="form-group half">
                                <label>Taille *</label>
                                <select class="form-control" id="taille">
                                    <option value="">Selectionnez</option>
                                    <option value="1-10">1-10 employes</option>
                                    <option value="11-50">11-50 employes</option>
                                    <option value="51-200">51-200 employes</option>
                                    <option value="201-500">201-500 employes</option>
                                    <option value="500+">500+ employes</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Siege social *</label>
                            <input type="text" class="form-control" id="localisation" placeholder="Ville, Pays">
                        </div>
                    </div>

                    <div class="form-section">
                        <h3><i class="fas fa-lock"></i> Securite</h3>

                        <div class="form-group">
                            <label>Mot de passe *</label>
                            <input type="password" class="form-control" id="password" placeholder="Minimum 8 caracteres">
                        </div>

                        <div class="form-group">
                            <label>Confirmer le mot de passe *</label>
                            <input type="password" class="form-control" id="confirmPassword" placeholder="Confirmez votre mot de passe">
                        </div>
                    </div>

                    <div class="form-checkbox">
                        <input type="checkbox" id="acceptTerms">
                        <label for="acceptTerms">J'accepte les conditions generales</label>
                    </div>

                    <button type="submit" class="btn-primary">
                        Creer mon espace recruteur
                        <i class="fas fa-arrow-right"></i>
                    </button>

                    <p class="login-link">
                        Deja inscrit ? <a href="connexion.html">Se connecter</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <script src="js/api-client.js"></script>
    <script src="inscription_employeur.js"></script>
</body>

</html>
